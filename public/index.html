<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Finanças BF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Finanças BF">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="manifest" href="/manifest.json">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    img {
      width: 180px;
      margin: 30px auto;
      display: block;
    }

    select, input, button {
      width: 100%;
      max-width: 320px;
      padding: 12px;
      margin: 10px auto;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      display: block;
    }

    button {
      background: #c9a24d;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <img src="/icon-512.png" alt="Finanças BF" />

  <select id="tipo">
    <option value="0">Supermercado</option>
    <option value="1">Feira</option>
    <option value="2">Açougue</option>
    <option value="3">Padaria</option>
    <option value="4">Refeições</option>
    <option value="5">Outros (Alimentação)</option>
    <option value="6">Estacionamento</option>
    <option value="7">Combustível</option>
    <option value="8">IPVA</option>
    <option value="9">Passagens</option>
    <option value="10">Seguro de Veículo</option>
    <option value="11">Taxi</option>
    <option value="12">Roupas</option>
    <option value="13">Calçados</option>
  </select>

  <select id="mes">
    <option value="0">Março</option>
    <option value="1">Abril</option>
    <option value="2">Maio</option>
    <option value="3">Junho</option>
    <option value="4">Julho</option>
    <option value="5">Agosto</option>
    <option value="6">Setembro</option>
    <option value="7">Outubro</option>
    <option value="8">Novembro</option>
    <option value="9">Dezembro</option>
  </select>

  <input id="valor" type="number" placeholder="Valor (ex: 123.45)" />

  <button onclick="enviar()">Adicionar despesa</button>

  <script>
    function enviar() {
      const tipo = document.getElementById("tipo").value;
      const mes = document.getElementById("mes").value;
      const valor = document.getElementById("valor").value;

      if (!valor || Number(valor) <= 0) {
        alert("Informe um valor válido");
        return;
      }

      // Envia tudo na URL para o login Microsoft
      const params = new URLSearchParams({ tipo, mes, valor });
      window.location.href = "/login?" + params.toString();
    }

    // Mensagem de sucesso após retorno do login
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get("sucesso") === "1") {
      alert("Excel atualizado ✅");
      // limpa URL
      window.history.replaceState({}, document.title, "/");
    }
  </script>

</body>
</html>
