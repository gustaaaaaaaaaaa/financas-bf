<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Finanças BF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA básico -->
  /manifest.json

  <!--Ícone Padrão-->
  /icon-192.png
  /icon-512.png

   <!-- iOS / Mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="B&F" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  /icon.192.png
  /icon.512.png
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }
    img {
      width: 180px;
      margin: 30px auto;
      display: block;
    }
    select, input, button {
      width: 100%;
      max-width: 320px;
      padding: 12px;
      margin: 10px auto;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      display: block;
    }
    button {
      background: #c9a24d;
      color: white;
      border: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <img src="icon-512.png" />

  <button onclick="login()">Entrar com Microsoft</button>

  <select id="tipo">
    <option value="0">Supermercado</option>
    <option value="1">Feira</option>
    <option value="2">Açougue</option>
    <option value="3">Padaria</option>
    <option value="4">Refeições</option>
    <option value="5">Outros (Alimentação)</option>
    <option value="6">Estacionamento</option>
    <option value="7">Combustível</option>
    <option value="8">IPVA</option>
    <option value="9">Passagens</option>
    <option value="10">Seguro de Veículo</option>
    <option value="11">Taxi</option>
    <option value="12">Roupas</option>
    <option value="13">Calçados</option>
  </select>

  <select id="mes">
    <option value="0">Março</option>
    <option value="1">Abril</option>
    <option value="2">Maio</option>
    <option value="3">Junho</option>
    <option value="4">Julho</option>
    <option value="5">Agosto</option>
    <option value="6">Setembro</option>
    <option value="7">Outubro</option>
    <option value="8">Novembro</option>
    <option value="9">Dezembro</option>
  </select>

  <input id="valor" type="number" placeholder="Valor (ex: 123.45)" />

  <button onclick="enviar()">Adicionar despesa</button>

<script>
function login() {
  window.location.href = "/login";
}

async function enviar() {
  await fetch("/atualizar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      tipo: tipo.value,
      mes: mes.value,
      valor: valor.value
    })
  });

  alert("Excel atualizado ✅");
}
</script>

</body>
</html>
